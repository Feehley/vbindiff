# VBinDiff "modern" color theme.
#
# This reproduces the dark theme that was briefly the built-in default:
# black background, bold cyan filename/mode bars, bold red diffs, bold
# yellow edits, bold blue divider between side-by-side panes.
#
# To use it every time, copy this file to ~/.vbindiffrc:
#   cp vbindiff-modern.conf ~/.vbindiffrc
#
# Or load it explicitly for one run:
#   vbindiff -c vbindiff-modern.conf -s file1 file2
#
# Format:  styleName = foreground/background[/bold|reverse|underline]
# Colors:  black, red, green, yellow, blue, magenta, cyan, white

background  = white/black
promptWin   = white/black
promptKey   = cyan/black/bold
promptBdr   = white/black/bold
currentMode = black/cyan/bold
fileName    = black/cyan/bold
fileWin     = white/black
fileDiff    = red/black/bold
fileEdit    = yellow/black/bold
divider     = blue/black/bold
