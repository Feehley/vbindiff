# Example VBinDiff color config file.
# Copy to ~/.vbindiffrc to load automatically, or pass explicitly with
# -c/--config.
#
# Format:  styleName = foreground/background[/bold|reverse|underline]
#
# Styles:
#   background    Base color used before anything else is drawn
#   promptWin     Background of the help bar at the bottom of the screen
#   promptKey     Highlighted key letters in the help bar (e.g. "F" in "F find")
#   promptBdr     Border/title text of popup windows (Goto, Find)
#   currentMode   Highlighted ASCII/EBCDIC indicator
#   fileName      The filename bar at the top of each pane
#   fileWin       The hex/ASCII body of each pane
#   fileDiff      Bytes that differ between the two files
#   fileEdit      Bytes you've changed while editing
#   divider       The vertical divider between the two side-by-side panes
#
# Colors: black, red, green, yellow, blue, magenta, cyan, white

# --- Classic diff style: red = changed bytes, green = accent ---
fileDiff    = red/black/bold
fileEdit    = yellow/black/bold
divider     = white/black/bold
fileName    = black/green/bold
promptKey   = green/black/bold
promptBdr   = white/black/bold
currentMode = black/green/bold
